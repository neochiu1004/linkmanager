<script>
        // ==========================================
        // 1. 資料模型與持久化管理器 (Dynamic Data Schema)
        // ==========================================
        const STORAGE_KEY = 'link_manager_data_v3_infinite'; 
        
        const defaultCategories = [
            { 
                id: "cat-A", 
                name: "Category A", 
                links: [
                    { id: "link-1", label: "簽到 (Sign-in)", url: "", color: "text-primary", border: "border-primary/10", bg: "bg-primary" },

                ]

                    { id: "link-2", label: "轉盤 (Spin)", url: "", color: "text-secondary", border: "border-secondary/10", bg: "bg-secondary" }
                ]
            },
            { 
                id: "cat-C", 
                name: "Category C", 
                links: [
                    { id: "link-1", label: "簽到 (Sign-in)", url: "", color: "text-primary", border: "border-primary/10", bg: "bg-primary" },
                    { id: "link-2", label: "轉盤 (Spin)", url: "", color: "text-secondary", border: "border-secondary/10", bg: "bg-secondary" }
                ]
            },
            { 
                id: "cat-D", 
                name: "Category D", 
                links: [
                    { id: "link-1", label: "簽到 (Sign-in)", url: "", color: "text-primary", border: "border-primary/10", bg: "bg-primary" },
                    { id: "link-2", label: "轉盤 (Spin)", url: "", color: "text-secondary", border: "border-secondary/10", bg: "bg-secondary" }
                ]
            },
            { 
                id: "cat-E", 
                name: "Category E", 
                links: [
                    { id: "link-1", label: "簽到 (Sign-in)", url: "", color: "text-primary", border: "border-primary/10", bg: "bg-primary" },
                    { id: "link-2", label: "轉盤 (Spin)", url: "", color: "text-secondary", border: "border-secondary/10", bg: "bg-secondary" }
                ]
            }
        ];

        let appState = { categories: [] };
        let currentEditingId = null; 
        let currentAddLinkCatId = null; 

        function showCustomAlert(title, message) {
            const dialog = document.getElementById('custom-dialog');
            const overlay = document.getElementById('dialog-overlay');
            const content = document.getElementById('dialog-content');
            document.getElementById('dialog-title').innerText = title;
            document.getElementById('dialog-message').innerText = message;
            const btnContainer = document.getElementById('dialog-buttons');
            btnContainer.innerHTML = `<button onclick="closeCustomDialog()" class="flex-1 text-primary font-semibold text-subheadline py-2 hover:bg-surface-container-low transition-colors rounded-b-2xl outline-none">確認</button>`;
            dialog.classList.remove('hidden');
            setTimeout(() => {
                overlay.classList.remove('opacity-0'); overlay.classList.add('opacity-100');
                content.classList.remove('scale-95', 'opacity-0'); content.classList.add('scale-100', 'opacity-100');
            }, 10);
        }

        function showCustomConfirm(title, message, onConfirm) {
            const dialog = document.getElementById('custom-dialog');
            const overlay = document.getElementById('dialog-overlay');
            const content = document.getElementById('dialog-content');
            document.getElementById('dialog-title').innerText = title;
            document.getElementById('dialog-message').innerText = message;
            const btnContainer = document.getElementById('dialog-buttons');
            btnContainer.innerHTML = `
                <button onclick="closeCustomDialog()" class="flex-1 text-on-surface-variant font-medium text-subheadline py-2 border-r border-outline-variant/30 hover:bg-surface-container-low transition-colors outline-none">取消</button>
                <button id="custom-dialog-confirm-btn" class="flex-1 text-error font-semibold text-subheadline py-2 hover:bg-surface-container-low transition-colors outline-none">確認</button>
            `;
            document.getElementById('custom-dialog-confirm-btn').onclick = () => { closeCustomDialog(); if (onConfirm) onConfirm(); };
            dialog.classList.remove('hidden');
            setTimeout(() => {
                overlay.classList.remove('opacity-0'); overlay.classList.add('opacity-100');
                content.classList.remove('scale-95', 'opacity-0'); content.classList.add('scale-100', 'opacity-100');
            }, 10);
        }

        function closeCustomDialog() {
            const dialog = document.getElementById('custom-dialog');
            const overlay = document.getElementById('dialog-overlay');
            const content = document.getElementById('dialog-content');
            content.classList.remove('scale-100', 'opacity-100'); content.classList.add('scale-95', 'opacity-0');
            overlay.classList.remove('opacity-100'); overlay.classList.add('opacity-0');
            setTimeout(() => { dialog.classList.add('hidden'); }, 200);
        }

        function initStorage() {
            const stored = localStorage.getItem(STORAGE_KEY);
            if (stored) {
                try {
                    appState.categories = JSON.parse(stored);
                } catch (e) {
                    appState.categories = JSON.parse(JSON.stringify(defaultCategories));
                    saveStorage();
                }
            } else {
                appState.categories = JSON.parse(JSON.stringify(defaultCategories));
                saveStorage();
            }
        }

        function saveStorage() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(appState.categories));
        }

        // ==========================================
        // 備份機制：JSON 資料匯出與匯入功能
        // ==========================================
        function exportDataToJson() {
            try {
                const dataStr = JSON.stringify(appState.categories, null, 2);
                const dataUri = 'data:application/json;charset=utf-8,'+ encodeURIComponent(dataStr);
                
                const exportFileDefaultName = `linkmanager_backup_${new Date().toISOString().slice(0,10)}.json`;
                
                const linkElement = document.createElement('a');
                linkElement.setAttribute('href', dataUri);
                linkElement.setAttribute('download', exportFileDefaultName);
                linkElement.click();
            } catch (err) {
                showCustomAlert('匯出失敗', '封裝 JSON 檔案時發生未知錯誤。');
            }
        }

        function importDataFromJson(event) {
            const input = event.target;
            if (!input.files || input.files.length === 0) return;

            const file = input.files[0];
            const reader = new FileReader();
            
            reader.onload = function() {
                try {
                    const importedObj = JSON.parse(reader.result);
                    
                    // 基礎的格式合法性驗證
                    if (Array.isArray(importedObj) && importedObj.length > 0 && importedObj[0].hasOwnProperty('links')) {
                        showCustomConfirm('確認還原備份嗎？', '匯入備份檔案將會完全覆蓋此裝置目前的連結資料。確認執行？', () => {
                            appState.categories = importedObj;
                            saveStorage();
                            renderAllTabs();
                            renderAllCards();
                            toggleSettingsModal(false);
                            showCustomAlert('匯入成功', '備份配置資料已成功在本地載入並還原！');
                        });
                    } else {
                        showCustomAlert('格式錯誤', '讀取的 JSON 結構與 LinkManager 規格不符，無法還原。');
                    }
                } catch (err) {
                    showCustomAlert('讀取失敗', '解析 JSON 檔案出錯，請確保檔案完整且未被毀損。');
                }
                input.value = ''; // 重置 file 欄位
            };
            reader.readAsText(file);
        }

        // ==========================================
        // 系統資料重置功能
        // ==========================================
        function clearAllData() {
            showCustomConfirm('危險操作確認', '這將會清除所有您的自定義分類與連結資料，並還原為系統預設值。確定要執行嗎？', () => {
                localStorage.removeItem(STORAGE_KEY);
                appState.categories = JSON.parse(JSON.stringify(defaultCategories));
                saveStorage();
                renderAllTabs();
                renderAllCards();
                toggleSettingsModal(false);
                showCustomAlert('已清除', '所有資料已成功還原為預設狀態。');
            });
        }

        // ==========================================
        // 局部清空功能：一鍵清除單一分類下的所有 URL 連結
        // ==========================================
        function clearLinksOnlyInCurrentCategory() {
            if (!currentEditingId) return;
            const cat = appState.categories.find(c => c.id === currentEditingId);
            if (!cat) return;

            showCustomConfirm('清除網址確認', `確定要清除「${cat.name}」內的所有連結網址嗎？\n(注意：連結項目的自定義名稱將會予以保留)`, () => {
                const catIndex = appState.categories.findIndex(c => c.id === currentEditingId);
                if (catIndex !== -1) {
                    // 將該分類下所有的 link 網址重設為空字串，完全保留項目 label 名稱
                    appState.categories[catIndex].links.forEach(link => {
                        link.url = "";
                    });
                    saveStorage();
                    renderAllCards();
                    openCategoryEditor(currentEditingId); // 局部重繪編輯窗
                }
            });
        }

        // ==========================================
        // 2. 智慧網址一鍵擷取器 (直接貼上，無對話框)
        // ==========================================
        async function handlePasteDirect(catId, linkId) {
            let pastedText = '';

            try {
                if (navigator.clipboard && navigator.clipboard.readText) {
                    pastedText = await navigator.clipboard.readText();
                } else {
                    throw new Error('Clipboard API blocked');
                }
            } catch (err) {
                console.warn('降級使用 prompt 視窗行為：', err);
                const targetCat = appState.categories.find(c => c.id === catId);
                const targetLink = targetCat ? targetCat.links.find(l => l.id === linkId) : null;
                pastedText = prompt(`請貼上或輸入目標連結網址：`, targetLink ? targetLink.url : '');
            }

            if (pastedText !== null) {
                const strictUrlRegex = /(https?:\/\/[^\s\u4e00-\u9fa5]+)/i;
                const match = pastedText.match(strictUrlRegex);
                
                let targetUrl = '';
                if (match) {
                    targetUrl = match[0].trim();
                } else {
                    const looseUrlRegex = /([a-zA-Z0-9-]+\.[a-zA-Z0-9-]+[^\s\u4e00-\u9fa5]*)/i;
                    const looseMatch = pastedText.match(looseUrlRegex);
                    if (looseMatch) {
                        targetUrl = 'https://' + looseMatch[0].trim();
                    }
                }

                if (targetUrl) {
                    const catIndex = appState.categories.findIndex(c => c.id === catId);
                    if (catIndex !== -1) {
                        const linkIndex = appState.categories[catIndex].links.findIndex(l => l.id === linkId);
                        if (linkIndex !== -1) {
                            appState.categories[catIndex].links[linkIndex].url = targetUrl;
                            saveStorage();
                            renderAllCards();
                            
                            const btnId = `paste-${catId}-${linkId}`;
                            const btn = document.getElementById(btnId);
                            if (btn) {
                                const originalHtml = btn.innerHTML;
                                btn.innerHTML = `<span class="material-symbols-outlined text-[18px]" data-icon="check">check</span> 已擷取網址`;
                                setTimeout(() => { btn.innerHTML = originalHtml; }, 1500);
                            }
                        }
                    }
                } else {
                    showCustomAlert('辨識失敗', '剪貼簿中找不到任何有效的網址片段，請確認複製後再試一次。');
                }
            }
        }

        function handleGoDirect(catId, linkId) {
            const targetCat = appState.categories.find(c => c.id === catId);
            const targetLink = targetCat ? targetCat.links.find(l => l.id === linkId) : null;

            if (targetLink && targetLink.url && /^https?:\/\//i.test(targetLink.url)) {
                window.open(targetLink.url, '_blank');
            } else {
                showCustomAlert('提示', `請先點擊「貼上連結」配置 [${targetLink ? targetLink.label : '功能'}] 的網址。`);
            }
        }

        // ==========================================
        // 3. 全卡片串流與圓圈 Pill 導覽渲染引擎
        // ==========================================
        function renderAllTabs() {
            const tabContainer = document.getElementById('category-tab-container');
            if (!tabContainer) return;
            tabContainer.innerHTML = '';
            
            appState.categories.forEach((cat, index) => {
                const btn = document.createElement('button');
                btn.setAttribute('data-cat', cat.id);
                // 圓形化精簡標籤樣式 (Circle Pills Style)
                btn.className = index === 0 
                    ? "bg-primary text-on-primary font-subheadline font-semibold px-5 py-2.5 rounded-full whitespace-nowrap shadow-sm active-scale transition-all duration-300" 
                    : "bg-surface-container-high text-on-surface-variant font-subheadline font-medium px-5 py-2.5 rounded-full whitespace-nowrap active-scale transition-all duration-300";
                btn.innerText = cat.name;

                btn.addEventListener('click', () => {
                    const targetCard = document.getElementById(`card-${cat.id}`);
                    if (targetCard) {
                        isProgrammaticScrolling = true; clearTimeout(scrollTimeout);
                        setActiveTabUI(cat.id);
                        const windowHeight = window.innerHeight;
                        const yOffset = -80; 
                        const y = targetCard.getBoundingClientRect().top + window.pageYOffset + yOffset;
                        window.scrollTo({ top: y, behavior: 'smooth' });
                        scrollTimeout = setTimeout(() => { isProgrammaticScrolling = false; }, 800);
                    }
                });
                tabContainer.appendChild(btn);
            });
        }

        function renderAllCards() {
            const container = document.getElementById('dynamic-card-container');
            if (!container) return;
            container.innerHTML = ''; 

            appState.categories.forEach(cat => {
                let linksHtml = '';
                
                cat.links.forEach(link => {
                    const activeColor = link.color || 'text-primary';
                    const activeBorder = link.border || 'border-primary/10';
                    const activeBg = link.bg || 'bg-primary';
                    
                    linksHtml += `
                    <div class="space-y-2 border-b border-outline-variant/10 pb-3.5 last:border-none last:pb-0">
                        <div class="flex items-center gap-2 ${activeColor}">
                            <span class="material-symbols-outlined text-[19px]" data-icon="link">link</span>
                            <span class="font-subheadline font-semibold text-subheadline truncate max-w-[85%]">${link.label}</span>
                        </div>
                        <div class="flex gap-2">
                            <button id="paste-${cat.id}-${link.id}" onclick="handlePasteDirect('${cat.id}', '${link.id}')" class="flex-1 bg-surface-container-low ${activeColor} font-subheadline font-semibold py-2 rounded-lg border ${activeBorder} active-scale flex items-center justify-center gap-1 transition-all outline-none">
                                <span class="material-symbols-outlined text-[18px]" data-icon="content_paste">content_paste</span>
                                ${link.url ? '更新連結' : '貼上連結'}
                            </button>
                            <button onclick="handleGoDirect('${cat.id}', '${link.id}')" class="flex-1 ${link.url ? activeBg : 'bg-neutral-400/40 cursor-not-allowed'} text-white font-subheadline font-semibold py-2 rounded-lg active-scale flex items-center justify-center gap-1 shadow-sm transition-all outline-none">
                                <span class="material-symbols-outlined text-[18px]" data-icon="open_in_new">open_in_new</span>
                                前往連結
                            </button>
                        </div>
                    </div>
                    `;
                });

                const cardHtml = `
                <div id="card-${cat.id}" data-category="${cat.id}" class="inset-grouped-card shadow-sm overflow-hidden border border-outline-variant/10 transition-all duration-300">
                    <div class="px-4 py-3 border-b border-outline-variant/10 bg-surface-container-lowest flex justify-between items-center">
                        <h3 class="font-headline text-headline text-on-surface font-bold tracking-tight">${cat.name}</h3>
                        <button onclick="openCategoryEditor('${cat.id}')" class="material-symbols-outlined text-outline hover:text-primary transition-colors p-1.5 outline-none" data-icon="more_horiz">more_horiz</button>
                    </div>
                    <div class="p-4 space-y-4">
                        ${linksHtml || '<p class="text-caption-sm text-outline text-center py-2">目前沒有任何連結項目</p>'}
                        
                        <div class="pt-1 flex justify-end">
                            <button onclick="openAddLinkPanel('${cat.id}')" class="text-xs font-semibold text-primary/90 hover:text-primary flex items-center gap-1 active-scale py-1 px-3 bg-primary/5 rounded-full border border-primary/10 transition-all outline-none">
                                <span class="material-symbols-outlined text-[14px]" data-icon="add">add</span> 新增項目
                            </button>
                        </div>
                    </div>
                </div>
                `;
                container.insertAdjacentHTML('beforeend', cardHtml);
            });

            initScrollSpy();
        }

        // ==========================================
        // 4. ScrollSpy 滾動自動選取監聽器
        // ==========================================
        let isProgrammaticScrolling = false;
        let scrollTimeout;
        let observer = null;

        function initScrollSpy() {
            if (observer) { observer.disconnect(); }
            observer = new IntersectionObserver((entries) => {
                if (isProgrammaticScrolling) return;
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        setActiveTabUI(entry.target.getAttribute('data-category'));
                    }
                });
            }, { root: null, rootMargin: '-25% 0px -55% 0px', threshold: 0 });

            appState.categories.forEach(cat => {
                const target = document.getElementById(`card-${cat.id}`);
                if (target) observer.observe(target);
            });
        }

        function setActiveTabUI(catId) {
            document.querySelectorAll('#category-tab-container button').forEach(btn => {
                if (btn.getAttribute('data-cat') === catId) {
                    btn.classList.remove('bg-surface-container-high', 'text-on-surface-variant', 'font-medium');
                    btn.classList.add('bg-primary', 'text-on-primary', 'font-semibold', 'shadow-sm');
                    btn.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
                } else {
                    btn.classList.remove('bg-primary', 'text-on-primary', 'font-semibold', 'shadow-sm');
                    btn.classList.add('bg-surface-container-high', 'text-on-surface-variant', 'font-medium');
                }
            });
        }

        // ==========================================
        // 5. iOS 抽屜彈出視窗控制中心
        // ==========================================
        function toggleSettingsModal(show) { 
            if(show) {
                renderCategorySortList();
            }
            toggleModal('settings-modal', 'modal-container', 'modal-overlay', show); 
        }

        function toggleEditModal(show) { toggleModal('edit-modal', 'edit-container', 'edit-overlay', show); }
        function toggleAddLinkModal(show) { toggleModal('add-link-modal', 'add-link-container', 'add-link-overlay', show); }

        function toggleModal(modalId, containerId, overlayId, show) {
            const modal = document.getElementById(modalId);
            const container = document.getElementById(containerId);
            const overlay = document.getElementById(overlayId);
            if (show) {
                modal.classList.remove('hidden');
                setTimeout(() => {
                    overlay.classList.remove('opacity-0'); overlay.classList.add('opacity-100');
                    container.classList.remove('translate-y-full'); container.classList.add('translate-y-0');
                }, 10);
            } else {
                container.classList.remove('translate-y-full'); container.classList.add('translate-y-full');
                overlay.classList.remove('opacity-100'); overlay.classList.add('opacity-0');
                setTimeout(() => { modal.classList.add('hidden'); }, 300);
            }
        }

        // ==========================================
        // 6. 客製化內部增刪管理邏輯
        // ==========================================
        function openCategoryEditor(catId) {
            const cat = appState.categories.find(c => c.id === catId);
            if (!cat) return;

            currentEditingId = catId;
            document.getElementById('edit-cat-name').value = cat.name;

            const linksListContainer = document.getElementById('edit-links-list');
            linksListContainer.innerHTML = '';
            
            cat.links.forEach((link) => {
                const item = document.createElement('div');
                item.className = "flex items-center gap-2 bg-surface-container-low p-2 rounded-lg border border-outline-variant/20";
                item.innerHTML = `
                    <input type="text" data-link-id="${link.id}" value="${link.label}" class="flex-1 px-2 py-1 border border-outline-variant/30 rounded bg-white text-xs text-on-surface focus:outline-none font-medium">
                    <button onclick="handleDeleteLinkInline('${link.id}')" class="material-symbols-outlined text-error hover:text-red-700 p-1 text-sm outline-none" data-icon="delete">delete</button>
                `;
                linksListContainer.appendChild(item);
            });

            if(cat.links.length === 0) {
                linksListContainer.innerHTML = `<p class="text-xs text-outline text-center py-4">無任何配置項目</p>`;
            }

            toggleEditModal(true);
        }

        function handleDeleteLinkInline(linkId) {
            const catIndex = appState.categories.findIndex(c => c.id === currentEditingId);
            if (catIndex !== -1) {
                appState.categories[catIndex].links = appState.categories[catIndex].links.filter(l => l.id !== linkId);
                saveStorage();
                openCategoryEditor(currentEditingId); 
                renderAllCards();
            }
        }

        function handleSaveCategory() {
            if (!currentEditingId) return;
            const newName = document.getElementById('edit-cat-name').value.trim();
            if (!newName) { showCustomAlert('錯誤', '分類名稱不能為空。'); return; }

            const catIndex = appState.categories.findIndex(c => c.id === currentEditingId);
            if (catIndex !== -1) {
                appState.categories[catIndex].name = newName;
                
                const inputs = document.querySelectorAll('#edit-links-list input');
                inputs.forEach(input => {
                    const lId = input.getAttribute('data-link-id');
                    const targetL = appState.categories[catIndex].links.find(l => l.id === lId);
                    if (targetL && input.value.trim()) {
                        targetL.label = input.value.trim();
                    }
                });

                saveStorage(); renderAllTabs(); renderAllCards(); toggleEditModal(false);
            }
        }

        function handleDeleteCategory() {
            if (!currentEditingId) return;
            const cat = appState.categories.find(c => c.id === currentEditingId);
            showCustomConfirm('刪除確認', `確定要完全刪除自定義分類「${cat.name}」嗎？`, () => {
                appState.categories = appState.categories.filter(c => c.id !== currentEditingId);
                saveStorage(); renderAllTabs(); renderAllCards(); toggleEditModal(false);
            });
        }

        function handleAddNewCategory() {
            const newId = 'cat-' + Date.now();
            const newCat = {
                id: newId, name: `Category ${appState.categories.length + 1}`,
                links: [
                    { id: "link-1", label: "簽到 (Sign-in)", url: "", color: "text-primary", border: "border-primary/10", bg: "bg-primary" },
                    { id: "link-2", label: "轉盤 (Spin)", url: "", color: "text-secondary", border: "border-secondary/10", bg: "bg-secondary" }
                ]
            };
            appState.categories.push(newCat);
            saveStorage(); renderAllTabs(); renderAllCards(); toggleSettingsModal(false);
            setTimeout(() => { openCategoryEditor(newId); }, 350);
        }

        let sortableInstance = null;

        function renderCategorySortList() {
            const listContainer = document.getElementById('category-sort-list');
            if (!listContainer) return;
            
            listContainer.innerHTML = '';
            appState.categories.forEach(cat => {
                const item = document.createElement('div');
                item.className = 'flex items-center gap-2 bg-surface-bright p-2 rounded-lg border border-outline-variant/20 cursor-move';
                item.setAttribute('data-id', cat.id);
                item.innerHTML = `
                    <span class="material-symbols-outlined text-outline text-[18px]" data-icon="drag_indicator">drag_indicator</span>
                    <span class="font-subheadline text-on-surface font-medium truncate flex-1">${cat.name}</span>
                `;
                listContainer.appendChild(item);
            });

            if (sortableInstance) {
                sortableInstance.destroy();
            }

            // 實例化拖曳套件，並設定延遲以符合手機長按拖曳習慣
            sortableInstance = new Sortable(listContainer, {
                animation: 150,
                delay: 150, 
                delayOnTouchOnly: true,
                onEnd: function (evt) {
                    const oldIndex = evt.oldIndex;
                    const newIndex = evt.newIndex;
                    
                    if (oldIndex === newIndex) return;
                    
                    const movedItem = appState.categories.splice(oldIndex, 1)[0];
                    appState.categories.splice(newIndex, 0, movedItem);
                    
                    saveStorage();
                    renderAllTabs();
                    renderAllCards();
                }
            });
        }

        // ==========================================
        // 7. 新增自定義按鈕擴增對話處理
        // ==========================================
        function openAddLinkPanel(catId) {
            currentAddLinkCatId = catId;
            document.getElementById('new-link-label').value = '';
            toggleAddLinkModal(true);
        }

        function handleConfirmAddLink() {
            const labelText = document.getElementById('new-link-label').value.trim();
            if (!labelText) { showCustomAlert('提示', '請輸入按鈕功能項目名稱！'); return; }

            const catIndex = appState.categories.findIndex(c => c.id === currentAddLinkCatId);
            if (catIndex !== -1) {
                const styles = [
                    { color: "text-primary", border: "border-primary/10", bg: "bg-primary" },
                    { color: "text-secondary", border: "border-secondary/10", bg: "bg-secondary" },
                    { color: "text-teal-600", border: "border-teal-500/10", bg: "bg-teal-600" },
                    { color: "text-amber-600", border: "border-amber-500/10", bg: "bg-amber-600" }
                ];
                const selectedStyle = styles[appState.categories[catIndex].links.length % styles.length];

                const newLinkItem = {
                    id: 'link-' + Date.now(),
                    label: labelText,
                    url: "",
                    color: selectedStyle.color,
                    border: selectedStyle.border,
                    bg: selectedStyle.bg
                };

                appState.categories[catIndex].links.push(newLinkItem);
                saveStorage();
                renderAllCards();
                toggleAddLinkModal(false);
            }
        }

        // ==========================================
        // 8. 系統網路狀態與全域初始化生命週期
        // ==========================================
        function updateOnlineStatus() {
            const banner = document.getElementById('offline-banner');
            const icon = document.getElementById('offline-icon');
            const text = document.getElementById('offline-text');
            if (navigator.onLine) {
                banner.className = 'bg-primary text-on-primary px-4 py-2 flex items-center justify-between transition-all duration-300';
                icon.innerText = 'cloud_done'; text.innerText = 'Ready for offline use';
            } else {
                banner.className = 'bg-error text-on-error px-4 py-2 flex items-center justify-between transition-all duration-300';
                icon.innerText = 'cloud_off'; text.innerText = 'You are currently offline';
                banner.style.display = 'flex';
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            initStorage(); renderAllTabs(); renderAllCards();
            window.addEventListener('online', updateOnlineStatus);
            window.addEventListener('offline', updateOnlineStatus);
            updateOnlineStatus();

            document.getElementById('manual-sync-btn').addEventListener('click', () => {
                const icon = document.getElementById('manual-sync-btn').querySelector('[data-icon="sync"]');
                icon.classList.add('animate-spin'); initStorage(); renderAllTabs(); renderAllCards();
                setTimeout(() => { icon.classList.remove('animate-spin'); }, 1000);
            });

            const btnHome = document.getElementById('nav-home');
            const btnSettings = document.getElementById('nav-settings');
            
            btnHome.addEventListener('click', () => {
                btnSettings.className = 'flex flex-col items-center justify-center text-on-surface-variant font-caption-sm text-caption-sm transition-colors outline-none';
                btnHome.className = 'flex flex-col items-center justify-center text-primary font-semibold font-caption-sm text-caption-sm transition-colors outline-none';
                window.scrollTo({ top: 0, behavior: 'smooth' });
            });

            btnSettings.addEventListener('click', () => {
                btnHome.className = 'flex flex-col items-center justify-center text-on-surface-variant font-caption-sm text-caption-sm transition-colors outline-none';
                btnSettings.className = 'flex flex-col items-center justify-center text-primary font-semibold font-caption-sm text-caption-sm transition-colors outline-none';
                toggleSettingsModal(true);
            });

            document.getElementById('modal-overlay').addEventListener('click', () => toggleSettingsModal(false));
            document.getElementById('edit-overlay').addEventListener('click', () => toggleEditModal(false));
            document.getElementById('add-link-overlay').addEventListener('click', () => toggleAddLinkModal(false));
            document.getElementById('dialog-overlay').addEventListener('click', () => closeCustomDialog());
        });

        // ==========================================
        // 9. PWA 獨立運行 Service Worker 註冊
        // ==========================================
        if ('serviceWorker' in navigator) {
            const swCode = `
                const CACHE_NAME = 'linkmanager-infinite-v5';
                const ASSETS = [
                    '/', '/index.html',
                    'https://cdn.tailwindcss.com?plugins=forms,container-queries',
                    'https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap',
                    'https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap'
                ];
                self.addEventListener('install', (e) => {
                    e.waitUntil(caches.open(CACHE_NAME).then((c) => c.addAll(ASSETS)).then(() => self.skipWaiting()));
                });
                self.addEventListener('activate', (e) => {
                    e.waitUntil(caches.keys().then((ks) => Promise.all(ks.map((k) => { if(k !== CACHE_NAME) return caches.delete(k); }))).then(() => self.clients.claim()));
                });
                self.addEventListener('fetch', (e) => {
                    e.respondWith(caches.match(e.request).then((res) => {
                        if (res) return res;
                        return fetch(e.request).then((nRes) => {
                            if(nRes.status === 200) { const c = nRes.clone(); caches.open(CACHE_NAME).then((ch) => ch.put(e.request, c)); }
                            return nRes;
                        }).catch(() => { if (e.request.mode === 'navigate') return caches.match('/'); });
                    }));
                });
            `;
            try {
                const blob = new Blob([swCode], { type: 'application/javascript' });
                navigator.serviceWorker.register(URL.createObjectURL(blob), { scope: '/' });
            } catch (err) { console.error('[PWA] SW Blob error:', err); }
        }
    </script>
