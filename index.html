<script>
        // ==========================================
        // 1. 資料持久化與動態模型管理器
        // ==========================================
        const STORAGE_KEY = 'link_manager_data_v2'; 
        
        const defaultCategories = [
            { id: "cat-A", name: "Category A", signinLabel: "簽到 (Sign-in)", signinUrl: "", spinLabel: "轉盤 (Spin)", spinUrl: "" },
            { id: "cat-B", name: "Category B", signinLabel: "簽到 (Sign-in)", signinUrl: "", spinLabel: "轉盤 (Spin)", spinUrl: "" },
            { id: "cat-C", name: "Category C", signinLabel: "簽到 (Sign-in)", signinUrl: "", spinLabel: "轉盤 (Spin)", spinUrl: "" },
            { id: "cat-D", name: "Category D", signinLabel: "簽到 (Sign-in)", signinUrl: "", spinLabel: "轉盤 (Spin)", spinUrl: "" },
            { id: "cat-E", name: "Category E", signinLabel: "簽到 (Sign-in)", signinUrl: "", spinLabel: "轉盤 (Spin)", spinUrl: "" }
        ];

        let appState = {
            categories: []
        };
        let currentEditingId = null; 

        function showCustomAlert(title, message) {
            const dialog = document.getElementById('custom-dialog');
            const overlay = document.getElementById('dialog-overlay');
            const content = document.getElementById('dialog-content');
            
            document.getElementById('dialog-title').innerText = title;
            document.getElementById('dialog-message').innerText = message;
            
            const btnContainer = document.getElementById('dialog-buttons');
            btnContainer.innerHTML = `
                <button onclick="closeCustomDialog()" class="flex-1 text-primary font-semibold text-subheadline py-2 hover:bg-surface-container-low transition-colors rounded-b-2xl outline-none focus:outline-none">
                    確認
                </button>
            `;
            
            dialog.classList.remove('hidden');
            setTimeout(() => {
                overlay.classList.remove('opacity-0');
                overlay.classList.add('opacity-100');
                content.classList.remove('scale-95', 'opacity-0');
                content.classList.add('scale-100', 'opacity-100');
            }, 10);
        }

        function showCustomConfirm(title, message, onConfirm) {
            const dialog = document.getElementById('custom-dialog');
            const overlay = document.getElementById('dialog-overlay');
            const content = document.getElementById('dialog-content');
            
            document.getElementById('dialog-title').innerText = title;
            document.getElementById('dialog-message').innerText = message;
            
            const btnContainer = document.getElementById('dialog-buttons');
            btnContainer.innerHTML = `
                <button onclick="closeCustomDialog()" class="flex-1 text-on-surface-variant font-medium text-subheadline py-2 border-r border-outline-variant/30 hover:bg-surface-container-low transition-colors outline-none focus:outline-none">
                    取消
                </button>
                <button id="custom-dialog-confirm-btn" class="flex-1 text-error font-semibold text-subheadline py-2 hover:bg-surface-container-low transition-colors outline-none focus:outline-none">
                    確認
                </button>
            `;
            
            document.getElementById('custom-dialog-confirm-btn').onclick = () => {
                closeCustomDialog();
                if (onConfirm) onConfirm();
            };

            dialog.classList.remove('hidden');
            setTimeout(() => {
                overlay.classList.remove('opacity-0');
                overlay.classList.add('opacity-100');
                content.classList.remove('scale-95', 'opacity-0');
                content.classList.add('scale-100', 'opacity-100');
            }, 10);
        }

        function closeCustomDialog() {
            const dialog = document.getElementById('custom-dialog');
            const overlay = document.getElementById('dialog-overlay');
            const content = document.getElementById('dialog-content');

            content.classList.remove('scale-100', 'opacity-100');
            content.classList.add('scale-95', 'opacity-0');
            overlay.classList.remove('opacity-100');
            overlay.classList.add('opacity-0');
            
            setTimeout(() => {
                dialog.classList.add('hidden');
            }, 200);
        }

        function initStorage() {
            const stored = localStorage.getItem(STORAGE_KEY);
            if (stored) {
                try {
                    appState.categories = JSON.parse(stored);
                } catch (e) {
                    console.error('儲存格式解析失敗，已還原為預設架構。', e);
                    appState.categories = JSON.parse(JSON.stringify(defaultCategories));
                    saveStorage();
                }
            } else {
                const v1Data = localStorage.getItem('link_manager_data');
                if (v1Data) {
                    try {
                        const parsedV1 = JSON.parse(v1Data);
                        appState.categories = JSON.parse(JSON.stringify(defaultCategories));
                        appState.categories.forEach(cat => {
                            const simpleKey = cat.name.split(' ').pop(); 
                            if (parsedV1[simpleKey]) {
                                cat.signinUrl = parsedV1[simpleKey].signin || '';
                                cat.spinUrl = parsedV1[simpleKey].spin || '';
                            }
                        });
                        saveStorage();
                        localStorage.removeItem('link_manager_data'); 
                    } catch (e) {
                        appState.categories = JSON.parse(JSON.stringify(defaultCategories));
                        saveStorage();
                    }
                } else {
                    appState.categories = JSON.parse(JSON.stringify(defaultCategories));
                    saveStorage();
                }
            }
        }

        function saveStorage() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(appState.categories));
        }

        function clearAllData() {
            showCustomConfirm('確認重置資料嗎？', '確定要清除所有分類設定，並恢復至預設 Category A~E 狀態嗎？此動作將無法復原。', () => {
                appState.categories = JSON.parse(JSON.stringify(defaultCategories));
                saveStorage();
                renderAllTabs();
                renderAllCards();
                toggleSettingsModal(false);
                window.scrollTo({ top: 0, behavior: 'smooth' });
            });
        }

        // ==========================================
        // 2. 智慧網址去雜質、自動比對篩選器
        // ==========================================
        async function handlePaste(catId, type) {
            let pastedText = '';

            try {
                if (navigator.clipboard && navigator.clipboard.readText) {
                    pastedText = await navigator.clipboard.readText();
                } else {
                    throw new Error('Clipboard API not available');
                }
            } catch (err) {
                console.warn('無法直接讀取剪貼簿，轉向普通輸入模式：', err);
                const targetCat = appState.categories.find(c => c.id === catId);
                const currentVal = targetCat ? (type === 'signin' ? targetCat.signinUrl : targetCat.spinUrl) : '';
                pastedText = prompt(`請在此處貼上或輸入新連結網址：`, currentVal);
            }

            if (pastedText !== null) {
                // 智慧修正：優先精準提取包含 http:// 或 https:// 且「排除中文與空白字元」的純網址區塊
                const strictUrlRegex = /(https?:\/\/[^\s\u4e00-\u9fa5]+)/i;
                const match = pastedText.match(strictUrlRegex);
                
                let targetUrl = '';
                
                if (match) {
                    targetUrl = match[0].trim();
                } else {
                    // 若完全找不到 http(s)，才試圖去撈可能存在的 www. 或純網域名稱區塊
                    const looseUrlRegex = /([a-zA-Z0-9-]+\.[a-zA-Z0-9-]+[^\s\u4e00-\u9fa5]*)/i;
                    const looseMatch = pastedText.match(looseUrlRegex);
                    if (looseMatch) {
                        targetUrl = 'https://' + looseMatch[0].trim();
                    }
                }

                if (targetUrl) {
                    const catIndex = appState.categories.findIndex(c => c.id === catId);
                    if (catIndex !== -1) {
                        if (type === 'signin') {
                            appState.categories[catIndex].signinUrl = targetUrl;
                        } else {
                            appState.categories[catIndex].spinUrl = targetUrl;
                        }
                        saveStorage();
                        renderAllCards();
                        
                        const btnId = `paste-${catId}-${type}`;
                        const btn = document.getElementById(btnId);
                        if (btn) {
                            const originalHtml = btn.innerHTML;
                            btn.innerHTML = `<span class="material-symbols-outlined text-[18px]" data-icon="check">check</span> 已擷取網址`;
                            setTimeout(() => { btn.innerHTML = originalHtml; }, 1500);
                        }
                    }
                } else {
                    showCustomAlert('辨識失敗', '剪貼簿的內容中找不到任何包含網址、英文域名或連結的片段，請重新複製。');
                }
            }
        }

        function handleGo(catId, type) {
            const targetCat = appState.categories.find(c => c.id === catId);
            if (!targetCat) return;

            const url = type === 'signin' ? targetCat.signinUrl : targetCat.spinUrl;
            const labelName = type === 'signin' ? targetCat.signinLabel : targetCat.spinLabel;

            if (url && /^https?:\/\//i.test(url)) {
                window.open(url, '_blank');
            } else {
                showCustomAlert('提示', `請先點擊「貼上連結」配置分類 [${targetCat.name}] 的 [${labelName}] 目標網址。`);
            }
        }

        // ==========================================
        // 3. 全卡片串流與 Tab 導覽渲染引擎
        // ==========================================
        function renderAllTabs() {
            const tabContainer = document.getElementById('category-tab-container');
            if (!tabContainer) return;

            tabContainer.innerHTML = '';
            appState.categories.forEach((cat, index) => {
                const btnClass = index === 0 
                    ? "bg-primary text-on-primary font-subheadline text-subheadline px-6 py-2 rounded-full whitespace-nowrap active-scale transition-all duration-300" 
                    : "bg-surface-container-high text-on-surface-variant font-subheadline text-subheadline px-6 py-2 rounded-full whitespace-nowrap active-scale transition-all duration-300";
                
                const btn = document.createElement('button');
                btn.setAttribute('data-cat', cat.id);
                btn.className = btnClass;
                btn.innerText = cat.name;

                btn.addEventListener('click', () => {
                    const targetCard = document.getElementById(`card-${cat.id}`);
                    if (targetCard) {
                        isProgrammaticScrolling = true;
                        clearTimeout(scrollTimeout);
                        
                        setActiveTabUI(cat.id);
                        
                        const yOffset = -100; 
                        const y = targetCard.getBoundingClientRect().top + window.pageYOffset + yOffset;
                        
                        window.scrollTo({ top: y, behavior: 'smooth' });

                        scrollTimeout = setTimeout(() => {
                            isProgrammaticScrolling = false;
                        }, 800);
                    }
                });

                tabContainer.appendChild(btn);
            });
        }

        function renderAllCards() {
            const container = document.getElementById('dynamic-card-container');
            if (!container) return;

            container.innerHTML = ''; 

            appState.categories.forEach(cat => {
                const cardHtml = `
                <div id="card-${cat.id}" data-category="${cat.id}" class="inset-grouped-card shadow-sm overflow-hidden border border-outline-variant/10 transition-all duration-300">
                    <div class="px-4 py-3 border-b border-outline-variant/10 bg-surface-container-lowest flex justify-between items-center">
                        <h3 class="font-headline text-headline text-on-surface">${cat.name}</h3>
                        <button onclick="openCategoryEditor('${cat.id}')" class="material-symbols-outlined text-outline hover:text-primary transition-colors p-1 outline-none focus:outline-none" data-icon="more_horiz">more_horiz</button>
                    </div>
                    
                    <div class="p-4 grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div class="space-y-3">
                            <div class="flex items-center gap-2 text-primary">
                                <span class="material-symbols-outlined text-[20px]" data-icon="how_to_reg">how_to_reg</span>
                                <span class="font-subheadline font-semibold text-subheadline">${cat.signinLabel || '簽到 (Sign-in)'}</span>
                            </div>
                            <div class="flex gap-2">
                                <button id="paste-${cat.id}-signin" onclick="handlePaste('${cat.id}', 'signin')" class="flex-1 bg-surface-container-low text-primary font-subheadline text-subheadline py-2.5 rounded-lg border border-primary/10 active-scale flex items-center justify-center gap-1 transition-all outline-none focus:outline-none">
                                    <span class="material-symbols-outlined text-[18px]" data-icon="content_paste">content_paste</span>
                                    ${cat.signinUrl ? '更新連結' : '貼上連結'}
                                </button>
                                <button onclick="handleGo('${cat.id}', 'signin')" class="flex-1 ${cat.signinUrl ? 'bg-primary' : 'bg-primary/50 cursor-not-allowed'} text-on-primary font-subheadline text-subheadline py-2.5 rounded-lg active-scale flex items-center justify-center gap-1 shadow-sm transition-colors outline-none focus:outline-none">
                                    <span class="material-symbols-outlined text-[18px]" data-icon="open_in_new">open_in_new</span>
                                    前往連結
                                </button>
                            </div>
                        </div>

                        <div class="space-y-3">
                            <div class="flex items-center gap-2 text-secondary">
                                <span class="material-symbols-outlined text-[20px]" data-icon="refresh">refresh</span>
                                <span class="font-subheadline font-semibold text-subheadline">${cat.spinLabel || '轉盤 (Spin)'}</span>
                            </div>
                            <div class="flex gap-2">
                                <button id="paste-${cat.id}-spin" onclick="handlePaste('${cat.id}', 'spin')" class="flex-1 bg-surface-container-low text-secondary font-subheadline text-subheadline py-2.5 rounded-lg border border-secondary/10 active-scale flex items-center justify-center gap-1 transition-all outline-none focus:outline-none">
                                    <span class="material-symbols-outlined text-[18px]" data-icon="content_paste">content_paste</span>
                                    ${cat.spinUrl ? '更新連結' : '貼上連結'}
                                </button>
                                <button onclick="handleGo('${cat.id}', 'spin')" class="flex-1 ${cat.spinUrl ? 'bg-secondary' : 'bg-secondary/50 cursor-not-allowed'} text-on-secondary font-subheadline text-subheadline py-2.5 rounded-lg active-scale flex items-center justify-center gap-1 shadow-sm transition-colors outline-none focus:outline-none">
                                    <span class="material-symbols-outlined text-[18px]" data-icon="open_in_new">open_in_new</span>
                                    前往連結
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
                `;
                container.insertAdjacentHTML('beforeend', cardHtml);
            });

            initScrollSpy();
        }

        // ==========================================
        // 4. ScrollSpy (滾動監聽定位系統)
        // ==========================================
        let isProgrammaticScrolling = false;
        let scrollTimeout;
        let observer = null;

        function initScrollSpy() {
            if (observer) {
                observer.disconnect();
            }

            const observerOptions = {
                root: null,
                rootMargin: '-30% 0px -50% 0px', 
                threshold: 0
            };

            observer = new IntersectionObserver((entries) => {
                if (isProgrammaticScrolling) return;

                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        const catId = entry.target.getAttribute('data-category');
                        setActiveTabUI(catId);
                    }
                });
            }, observerOptions);

            appState.categories.forEach(cat => {
                const target = document.getElementById(`card-${cat.id}`);
                if (target) observer.observe(target);
            });
        }

        function setActiveTabUI(catId) {
            const tabButtons = document.querySelectorAll('#category-tab-container button');
            tabButtons.forEach(btn => {
                if (btn.getAttribute('data-cat') === catId) {
                    btn.classList.remove('bg-surface-container-high', 'text-on-surface-variant');
                    btn.classList.add('bg-primary', 'text-on-primary');
                    btn.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
                } else {
                    btn.classList.remove('bg-primary', 'text-on-primary');
                    btn.classList.add('bg-surface-container-high', 'text-on-surface-variant');
                }
            });
        }

        // ==========================================
        // 5. iOS Styles Bottom Drawer 控制器
        // ==========================================
        function toggleSettingsModal(show) {
            const modal = document.getElementById('settings-modal');
            const container = document.getElementById('modal-container');
            const overlay = document.getElementById('modal-overlay');

            if (show) {
                modal.classList.remove('hidden');
                setTimeout(() => {
                    overlay.classList.remove('opacity-0');
                    overlay.classList.add('opacity-100');
                    container.classList.remove('translate-y-full');
                    container.classList.add('translate-y-0');
                }, 10);
            } else {
                container.classList.remove('translate-y-0');
                container.classList.add('translate-y-full');
                overlay.classList.remove('opacity-100');
                overlay.classList.add('opacity-0');
                setTimeout(() => {
                    modal.classList.add('hidden');
                }, 300);
            }
        }

        function toggleEditModal(show) {
            const modal = document.getElementById('edit-modal');
            const container = document.getElementById('edit-container');
            const overlay = document.getElementById('edit-overlay');

            if (show) {
                modal.classList.remove('hidden');
                setTimeout(() => {
                    overlay.classList.remove('opacity-0');
                    overlay.classList.add('opacity-100');
                    container.classList.remove('translate-y-full');
                    container.classList.add('translate-y-0');
                }, 10);
            } else {
                container.classList.remove('translate-y-0');
                container.classList.add('translate-y-full');
                overlay.classList.remove('opacity-100');
                overlay.classList.add('opacity-0');
                setTimeout(() => {
                    modal.classList.add('hidden');
                }, 300);
            }
        }

        // ==========================================
        // 6. 客製化分類與名稱編輯器核心行為 (Editor Actions)
        // ==========================================
        function openCategoryEditor(catId) {
            const cat = appState.categories.find(c => c.id === catId);
            if (!cat) return;

            currentEditingId = catId;
            document.getElementById('edit-cat-name').value = cat.name;
            document.getElementById('edit-cat-signin-label').value = cat.signinLabel || '簽到 (Sign-in)';
            document.getElementById('edit-cat-spin-label').value = cat.spinLabel || '轉盤 (Spin)';

            toggleEditModal(true);
        }

        function handleSaveCategory() {
            if (!currentEditingId) return;

            const newName = document.getElementById('edit-cat-name').value.trim();
            const newSigninLabel = document.getElementById('edit-cat-signin-label').value.trim();
            const newSpinLabel = document.getElementById('edit-cat-spin-label').value.trim();

            if (!newName) {
                showCustomAlert('錯誤', '分類名稱不能為空。');
                return;
            }

            const catIndex = appState.categories.findIndex(c => c.id === currentEditingId);
            if (catIndex !== -1) {
                appState.categories[catIndex].name = newName;
                appState.categories[catIndex].signinLabel = newSigninLabel || '簽到 (Sign-in)';
                appState.categories[catIndex].spinLabel = newSpinLabel || '轉盤 (Spin)';

                saveStorage();
                renderAllTabs();
                renderAllCards();
                toggleEditModal(false);
            }
        }

        function handleDeleteCategory() {
            if (!currentEditingId) return;

            const cat = appState.categories.find(c => c.id === currentEditingId);
            if (!cat) return;

            showCustomConfirm('刪除確認', `確定要刪除自定義分類「${cat.name}」嗎？此分類的所有網址資料將被完全移除。`, () => {
                appState.categories = appState.categories.filter(c => c.id !== currentEditingId);
                saveStorage();
                renderAllTabs();
                renderAllCards();
                toggleEditModal(false);
            });
        }

        function handleAddNewCategory() {
            const newId = 'cat-' + Date.now();
            const count = appState.categories.length + 1;
            const newCat = {
                id: newId,
                name: `Category ${count}`,
                signinLabel: "簽到 (Sign-in)",
                signinUrl: "",
                spinLabel: "轉盤 (Spin)",
                spinUrl: ""
            };

            appState.categories.push(newCat);
            saveStorage();
            renderAllTabs();
            renderAllCards();
            
            toggleSettingsModal(false);
            setTimeout(() => {
                openCategoryEditor(newId);
            }, 350);
        }

        // ==========================================
        // 7. 系統網路與 PWA 初始化
        // ==========================================
        function updateOnlineStatus() {
            const banner = document.getElementById('offline-banner');
            const icon = document.getElementById('offline-icon');
            const text = document.getElementById('offline-text');

            if (navigator.onLine) {
                banner.classList.remove('bg-error', 'text-on-error');
                banner.classList.add('bg-primary', 'text-on-primary');
                icon.innerText = 'cloud_done';
                text.innerText = 'Ready for offline use';
            } else {
                banner.classList.remove('bg-primary', 'text-on-primary');
                banner.classList.add('bg-error', 'text-on-error');
                icon.innerText = 'cloud_off';
                text.innerText = 'You are currently offline';
                banner.style.display = 'flex';
            }
        }

        // ==========================================
        // 8. 全域生命週期與事件綁定
        // ==========================================
        document.addEventListener('DOMContentLoaded', () => {
            initStorage();
            renderAllTabs();
            renderAllCards();

            window.addEventListener('online', updateOnlineStatus);
            window.addEventListener('offline', updateOnlineStatus);
            updateOnlineStatus();

            const syncBtn = document.getElementById('manual-sync-btn');
            syncBtn.addEventListener('click', () => {
                const icon = syncBtn.querySelector('[data-icon="sync"]');
                icon.classList.add('animate-spin');
                initStorage();
                renderAllTabs();
                renderAllCards();
                setTimeout(() => {
                    icon.classList.remove('animate-spin');
                }, 1000);
            });

            const btnHome = document.getElementById('nav-home');
            const btnSettings = document.getElementById('nav-settings');

            const navs = [btnHome, btnSettings];
            function setNavActive(activeBtn) {
                navs.forEach(btn => {
                    btn.classList.remove('text-primary', 'font-semibold');
                    btn.classList.add('text-on-surface-variant');
                });
                activeBtn.classList.add('text-primary', 'font-semibold');
                activeBtn.classList.remove('text-on-surface-variant');
            }

            btnHome.addEventListener('click', () => {
                setNavActive(btnHome);
                window.scrollTo({ top: 0, behavior: 'smooth' });
            });

            btnSettings.addEventListener('click', () => {
                setNavActive(btnSettings);
                toggleSettingsModal(true);
            });

            document.getElementById('modal-overlay').addEventListener('click', () => {
                toggleSettingsModal(false);
            });
            document.getElementById('edit-overlay').addEventListener('click', () => {
                toggleEditModal(false);
            });
            document.getElementById('dialog-overlay').addEventListener('click', () => {
                closeCustomDialog();
            });
        });

        // ==========================================
        // 9. PWA Service Worker (動態 Blob 封裝)
        // ==========================================
        if ('serviceWorker' in navigator) {
            const swCode = `
                const CACHE_NAME = 'linkmanager-feed-v3';
                const ASSETS = [
                    '/',
                    '/index.html',
                    'https://cdn.tailwindcss.com?plugins=forms,container-queries',
                    'https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap',
                    'https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap'
                ];

                self.addEventListener('install', (e) => {
                    e.waitUntil(
                        caches.open(CACHE_NAME).then((cache) => {
                            return cache.addAll(ASSETS);
                        }).then(() => self.skipWaiting())
                    );
                });

                self.addEventListener('activate', (e) => {
                    e.waitUntil(
                        caches.keys().then((keys) => {
                            return Promise.all(
                                keys.map((key) => {
                                    if (key !== CACHE_NAME) {
                                        return caches.delete(key);
                                    }
                                })
                            );
                        }).then(() => self.clients.claim())
                    );
                });

                self.addEventListener('fetch', (e) => {
                    e.respondWith(
                        caches.match(e.request).then((cachedResponse) => {
                            if (cachedResponse) {
                                return cachedResponse;
                            }
                            return fetch(e.request).then((networkResponse) => {
                                if (networkResponse.status === 200) {
                                    const cacheCopy = networkResponse.clone();
                                    caches.open(CACHE_NAME).then((cache) => {
                                        cache.put(e.request, cacheCopy);
                                    });
                                }
                                return networkResponse;
                            }).catch(() => {
                                if (e.request.mode === 'navigate') {
                                    return caches.match('/');
                                }
                            });
                        })
                    );
                });
            `;

            try {
                const blob = new Blob([swCode], { type: 'application/javascript' });
                const blobURL = URL.createObjectURL(blob);
                navigator.serviceWorker.register(blobURL, { scope: '/' })
                    .then(() => console.log('[PWA] Service Worker dynamically registered.'))
                    .catch((err) => console.error('[PWA] Registration failed:', err));
            } catch (err) {
                console.error('[PWA] Blob Generation Error:', err);
            }
        }
    </script>
